// ==================== 渲染函数 ====================
function renderTag(tag, theme) {
  const tc = theme.tagColors[tag.color] || theme.tagColors.gray;
  return `<span style="display:inline-block;font-size:12px;line-height:1;padding:3px 8px;border-radius:3px;background:${tc.bg};color:${tc.text};font-weight:600;margin-right:6px;vertical-align:middle;">${tag.text}</span>`;
}

function renderStats(stats, theme) {
  if (!stats || !stats.length) return '';
  return `<p style="margin:8px 0 0 0;padding:0;">${stats.map(s =>
    `<span style="display:inline-block;font-size:12px;padding:3px 10px;border-radius:4px;background:${theme.accentLight};color:${theme.accent};font-weight:600;margin-right:8px;margin-bottom:4px;">${s}</span>`
  ).join('')}</p>`;
}

function renderGithubSection(section, theme, themeKey) {
  const isNYT = themeKey === 'nyt';
  let html = '';

  // Section Title
  html += renderSectionTitle(section, theme, themeKey);

  // GitHub grid - 用table实现兼容微信
  html += `<table style="width:100%;border-collapse:separate;border-spacing:${isNYT ? '0' : '8px'};">`;
  for (let i = 0; i < section.items.length; i += 2) {
    html += '<tr>';
    for (let j = i; j < Math.min(i + 2, section.items.length); j++) {
      const item = section.items[j];
      if (isNYT) {
        html += `<td style="width:50%;padding:10px 12px;vertical-align:top;border-bottom:1px solid ${theme.border};">
          <p style="margin:0;font-family:${theme.fontFamily};font-size:14px;font-weight:700;color:${theme.text};line-height:1.4;">${item.title}</p>
          <p style="margin:4px 0 0 0;font-size:12px;color:${theme.textSub};line-height:1.5;font-family:${theme.bodyFont};">${item.desc}</p>
          <p style="margin:4px 0 0 0;font-size:12px;color:#D4A017;font-weight:600;">⭐ ${item.stars}</p>
        </td>`;
      } else {
        html += `<td style="width:50%;padding:12px 14px;vertical-align:top;background:${theme.sectionBg};border-radius:8px;">
          <p style="margin:0;font-size:14px;font-weight:600;color:${theme.accent};line-height:1.4;font-family:${theme.bodyFont};">${item.title}</p>
          <p style="margin:4px 0 0 0;font-size:12px;color:${theme.textSub};line-height:1.5;font-family:${theme.bodyFont};">${item.desc}</p>
          <p style="margin:4px 0 0 0;font-size:12px;color:#D97757;font-weight:600;">⭐ ${item.stars}</p>
        </td>`;
      }
    }
    if (section.items.length % 2 !== 0 && i + 2 >= section.items.length) {
      html += '<td></td>';
    }
    html += '</tr>';
  }
  html += '</table>';
  return html;
}

function renderSectionTitle(section, theme, themeKey) {
  const isNYT = themeKey === 'nyt';
  if (isNYT) {
    // NYT: 经典报纸分隔线 + 衬线体标题
    return `
      <div style="margin:28px 0 0 0;padding:0;">
        <div style="border-top:3px double ${theme.text};margin-bottom:12px;"></div>
        <h2 style="margin:0 0 16px 0;font-family:${theme.fontFamily};font-size:20px;font-weight:700;color:${theme.text};letter-spacing:0.5px;line-height:1.3;">
          <span style="margin-right:8px;">${section.icon}</span>${section.title}
        </h2>
      </div>`;
  } else {
    // Claude: 暖色左边框 + 圆角背景
    return `
      <div style="margin:24px 0 0 0;padding:0;">
        <div style="background:${theme.sectionBg};border-left:4px solid ${theme.accent};border-radius:0 8px 8px 0;padding:10px 16px;margin-bottom:14px;">
          <h2 style="margin:0;font-family:${theme.bodyFont};font-size:18px;font-weight:700;color:${theme.text};line-height:1.4;">
            <span style="margin-right:6px;">${section.icon}</span>${section.title}
          </h2>
        </div>
      </div>`;
  }
}

  const isNYT = themeKey === 'nyt';
  const tagsHtml = (item.tags || []).map(t => renderTag(t, theme)).join('');
  const statsHtml = renderStats(item.stats, theme);

  if (isNYT) {
    // NYT: 简约经典，细线分隔，衬线标题
    return `
      <div style="padding:14px 0;border-bottom:1px solid ${theme.border};">
        <p style="margin:0 0 4px 0;">${tagsHtml}</p>
        <h3 style="margin:0 0 6px 0;font-family:${theme.fontFamily};font-size:17px;font-weight:700;color:${theme.text};line-height:1.45;letter-spacing:0.2px;">${item.title}</h3>
        <p style="margin:0 0 6px 0;font-family:${theme.bodyFont};font-size:14px;color:${theme.textSub};line-height:1.75;">${item.body}</p>
        ${statsHtml}
        <p style="margin:6px 0 0 0;font-size:12px;color:#999;font-family:${theme.bodyFont};line-height:1.4;">${item.source}</p>
      </div>`;
  } else {
    // Claude: 卡片式，暖色调，圆角边框
    return `
      <div style="background:${theme.cardBg};border:1px solid ${theme.border};border-radius:10px;padding:14px 18px;margin-bottom:10px;">
        <p style="margin:0 0 6px 0;line-height:1;">${tagsHtml}</p>
        <h3 style="margin:0 0 6px 0;font-family:${theme.bodyFont};font-size:16px;font-weight:700;color:${theme.text};line-height:1.45;">${item.title}</h3>
        <p style="margin:0 0 6px 0;font-family:${theme.bodyFont};font-size:14px;color:${theme.textSub};line-height:1.75;">${item.body}</p>
        ${statsHtml}
        <p style="margin:6px 0 0 0;font-size:12px;color:#999;font-family:${theme.bodyFont};line-height:1.4;">${item.source}</p>
      </div>`;
  }
}

function render(themeKey) {
  const theme = themes[themeKey];
  const isNYT = themeKey === 'nyt';
  let html = '';

  // 最外层容器
  html += `<div style="max-width:680px;margin:0 auto;padding:${isNYT ? '0' : '20px'};background:${theme.bg};font-family:${theme.bodyFont};color:${theme.text};">`;

  // ======= Header =======
  if (isNYT) {
    // NYT 报纸头
    html += `
      <div style="text-align:center;padding:24px 0 16px 0;border-bottom:4px double ${theme.text};">
        <p style="margin:0;font-size:11px;color:${theme.textSub};font-family:${theme.fontFamily};letter-spacing:4px;text-transform:uppercase;">AI SIGNAL</p>
        <h1 style="margin:6px 0;font-family:${theme.fontFamily};font-size:32px;font-weight:700;color:${theme.text};letter-spacing:1px;line-height:1.2;">Daily Brief</h1>
        <p style="margin:0;font-size:13px;color:${theme.textSub};font-family:${theme.fontFamily};">${dailyData.date}</p>
        <div style="border-top:1px solid ${theme.border};margin-top:12px;"></div>
      </div>`;
    // NYT 导语
    html += `
      <div style="padding:14px 0;border-bottom:1px solid ${theme.border};">
        <p style="margin:0;font-family:${theme.fontFamily};font-size:15px;color:${theme.textSub};line-height:1.8;font-style:italic;">${dailyData.summary}</p>
      </div>`;
  } else {
    // Claude 头部
    html += `
      <div style="text-align:center;padding:24px 20px;margin-bottom:4px;">
        <div style="display:inline-block;background:${theme.headerGradient};padding:10px 28px;border-radius:12px;">
          <h1 style="margin:0;font-size:24px;font-weight:700;color:#FFFFFF;letter-spacing:0.5px;line-height:1.3;font-family:${theme.bodyFont};">AI Signal Daily Brief</h1>
        </div>
        <p style="margin:10px 0 0 0;font-size:13px;color:${theme.textSub};font-family:${theme.bodyFont};">${dailyData.date}</p>
      </div>`;
    // Claude 摘要
    html += `
      <div style="background:${theme.sectionBg};border:1px solid ${theme.border};border-radius:10px;padding:14px 18px;margin-bottom:4px;">
        <p style="margin:0;font-size:13px;color:${theme.accent};font-weight:600;margin-bottom:6px;font-family:${theme.bodyFont};">📌 今日速览</p>
        <p style="margin:0;font-size:14px;color:${theme.textSub};line-height:1.75;font-family:${theme.bodyFont};">${dailyData.summary}</p>
      </div>`;
  }

  // ======= Sections =======
  for (const section of dailyData.sections) {
    if (section.isGithub) {
      html += renderGithubSection(section, theme, themeKey);
    } else {
      html += renderSectionTitle(section, theme, themeKey);
      for (const item of section.items) {
        html += renderItem(item, theme, themeKey);
      }
    }
  }

  // ======= Footer =======
  if (isNYT) {
    html += `
      <div style="border-top:3px double ${theme.text};margin-top:24px;padding:16px 0;text-align:center;">
        <p style="margin:0;font-family:${theme.fontFamily};font-size:12px;color:${theme.textSub};">AI Signal Daily Brief · ${dailyData.date}</p>
        <p style="margin:4px 0 0 0;font-family:${theme.fontFamily};font-size:11px;color:#bbb;">数据来源：Tavily · GitHub Trending · 东方财富 · 新浪科技 · TechCrunch 等 20+ 源</p>
      </div>`;
  } else {
    html += `
      <div style="border-top:1px solid ${theme.border};margin-top:20px;padding:16px 0;text-align:center;">
        <p style="margin:0;font-size:12px;color:${theme.textSub};font-family:${theme.bodyFont};">AI Signal Daily Brief · ${dailyData.date}</p>
        <p style="margin:4px 0 0 0;font-size:11px;color:#bbb;font-family:${theme.bodyFont};">数据来源：Tavily · GitHub Trending · 东方财富 · 新浪科技 · TechCrunch 等 20+ 源</p>
      </div>`;
  }

  html += '</div>';

  document.getElementById('wechat-content').innerHTML = html;
}

// ==================== 交互 ====================
function switchTheme(theme) {
  currentTheme = theme;
  document.getElementById('btn-claude').classList.toggle('active', theme === 'claude');
  document.getElementById('btn-nyt').classList.toggle('active', theme === 'nyt');
  render(theme);
}

function copyToClipboard() {
  const content = document.getElementById('wechat-content');
  const range = document.createRange();
  range.selectNodeContents(content);
  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  // 同时写入 HTML 和纯文本到剪贴板
  const htmlContent = content.innerHTML;
  const textContent = content.innerText;

  if (navigator.clipboard && navigator.clipboard.write) {
    const blob = new ClipboardItem({
      'text/html': new Blob([htmlContent], { type: 'text/html' }),
      'text/plain': new Blob([textContent], { type: 'text/plain' }),
    });
    navigator.clipboard.write([blob]).then(() => {
      showToast();
    }).catch(() => {
      // fallback
      document.execCommand('copy');
      showToast();
    });
  } else {
    document.execCommand('copy');
    showToast();
  }
  selection.removeAllRanges();
}

function showToast() {
  const toast = document.getElementById('toast');
  const btn = document.getElementById('btn-copy');
  btn.textContent = '✅ 已复制';
  btn.classList.add('copied');
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
    btn.textContent = '📋 复制到公众号';
    btn.classList.remove('copied');
  }, 2000);
}

// 初始渲染
try {
  render('claude');
} catch(e) {
  document.getElementById('wechat-content').innerHTML = '<div style="padding:40px;color:red;font-size:16px;">渲染错误: ' + e.message + '<br><br>Stack: ' + e.stack + '</div>';
}
</script>
